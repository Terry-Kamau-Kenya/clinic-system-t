 <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<nav class="navbar">
    <h1><i class="fas fa-clinic-medical"></i> MediQueue</h1>
    <div class="user-info">
        <span id="userNameDisplay">Welcome, User</span>
        <button id="logoutBtn" class="btn-outline">Logout</button>
    </div>
</nav>

<main class="container">
    <section id="patientView" class="hidden">
        <div class="grid">
            <div class="card">
                <h3><i class="fas fa-calendar-plus"></i> Book Appointment</h3>
                <form id="bookingForm">
                    <select id="doctorSelect" required>
                        <option value="">-- Select Doctor --</option>
                    </select>
                    <input type="date" id="appointmentDate" required>
                    <input type="time" id="appointmentTime" required>
                    <button type="submit" class="btn-success">Confirm Booking</button>
                </form>
            </div>

            <div class="card queue-card">
                <h3><i class="fas fa-users"></i> Live Queue Status</h3>
                <div id="queueDisplay">
                    <p>Current Serving: <strong id="currentServing">--</strong></p>
                    <p>Your Position: <strong id="userPosition">--</strong></p>
                </div>
            </div>
        </div>
    </section>

    <section id="adminView" class="hidden">
        <h2>Admin Control Panel</h2>
        <div class="admin-grid">
            <div class="card">
                <h3>Current Appointments</h3>
                <table id="adminApptTable">
                    <thead>
                        <tr>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminApptBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>
<script src="patient.js"></script>
<script src="admin.js"></script>
<script src="dashboard.js"></script>
