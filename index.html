<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediQueue - Clinic Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">Login to MediQueue</h2>
            <p>Manage your appointments easily</p>
            
            <form id="authForm">
                <div id="nameFieldGroup" class="input-group" style="display: none;">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" id="authBtn" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <p class="toggle-text">
                <span id="toggleMsg">Don't have an account?</span> 
                <a href="#" id="toggleAuth">Register here</a>
            </p>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
